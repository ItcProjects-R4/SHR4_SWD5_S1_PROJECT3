<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 250" width="100%" height="100%" style="border-radius: 16px;">
  <defs>
    <!-- Background Gradient -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#040814" />
      <stop offset="50%" stop-color="#091428" />
      <stop offset="100%" stop-color="#040814" />
    </linearGradient>

    <!-- Cyan Glow Filter for ECG line -->
    <filter id="cyanGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="5" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>

    <!-- Subtle Text Glow Filter -->
    <filter id="textGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="4" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>

  <style>
    .title-text {
      font-family: 'Cairo', 'Segoe UI', system-ui, -apple-system, sans-serif;
      font-weight: 900;
      font-size: 56px;
      fill: #ffffff;
      letter-spacing: 2px;
    }
    .subtitle-text {
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      font-weight: 700;
      font-size: 16px;
      fill: #00e5ff;
      letter-spacing: 6px;
    }
    .info-text {
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      font-weight: 500;
      font-size: 12px;
      fill: #526b8e;
      letter-spacing: 2px;
    }
    
    /* Dim background pulse line */
    .pulse-bg {
      fill: none;
      stroke: #00e5ff;
      stroke-width: 1.5;
      stroke-opacity: 0.12;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    /* Animated glowing ECG line */
    .pulse-glow {
      fill: none;
      stroke: #00e5ff;
      stroke-width: 2.5;
      stroke-linecap: round;
      stroke-linejoin: round;
      stroke-dasharray: 160 840; /* 160px dash length, 840px gap */
      animation: ecgSweep 2.5s linear infinite;
    }

    @keyframes ecgSweep {
      0% {
        stroke-dashoffset: 1000;
      }
      100% {
        stroke-dashoffset: 0;
      }
    }

    .grid-line {
      stroke: #ffffff;
      stroke-opacity: 0.03;
      stroke-width: 1;
    }
    .corner-bracket {
      fill: none;
      stroke: #00e5ff;
      stroke-width: 2.5;
      stroke-linecap: round;
      stroke-opacity: 0.8;
    }

    /* Pulsing glow dots on peak values */
    .pulse-dot {
      fill: #00e5ff;
      animation: dotPulse 1.25s ease-in-out infinite;
    }

    @keyframes dotPulse {
      0%, 100% {
        opacity: 0.3;
      }
      50% {
        opacity: 1;
      }
    }
  </style>

  <!-- Background -->
  <rect x="0" y="0" width="800" height="250" rx="16" fill="url(#bgGrad)" stroke="#1e293b" stroke-width="1.5" />

  <!-- Grid Pattern -->
  <path d="M 0 50 L 800 50 M 0 100 L 800 100 M 0 150 L 800 150 M 0 200 L 800 200" class="grid-line" />
  <path d="M 100 0 L 100 250 M 200 0 L 200 250 M 300 0 L 300 250 M 400 0 L 400 250 M 500 0 L 500 250 M 600 0 L 600 250 M 700 0 L 700 250" class="grid-line" />

  <!-- Corner Brackets -->
  <path d="M 25 45 L 25 25 L 45 25" class="corner-bracket" />
  <path d="M 25 205 L 25 225 L 45 225" class="corner-bracket" />
  <path d="M 775 45 L 775 25 L 755 25" class="corner-bracket" />
  <path d="M 775 205 L 775 225 L 755 225" class="corner-bracket" />

  <!-- Faint decorative circular status lights -->
  <circle cx="80" cy="125" r="25" fill="none" stroke="#00e5ff" stroke-opacity="0.1" stroke-width="1" />
  <circle cx="80" cy="125" r="4" class="pulse-dot" />
  <circle cx="720" cy="125" r="25" fill="none" stroke="#00e5ff" stroke-opacity="0.1" stroke-width="1" />
  <circle cx="720" cy="125" r="4" class="pulse-dot" />

  <!-- Heartbeat ECG Pulse Line - Background (Static & Dim) -->
  <path d="M 0 135 
           L 180 135 
           L 190 120 L 195 150 L 200 135
           L 320 135 
           L 330 110 L 335 160 L 340 135
           L 360 135
           L 368 70 L 376 210 L 384 120 L 388 150 L 394 135
           L 510 135
           L 520 115 L 525 155 L 530 135
           L 610 135
           L 620 125 L 625 145 L 630 135
           L 800 135" 
        class="pulse-bg" />

  <!-- Heartbeat ECG Pulse Line - Foreground (Animated & Glowing) -->
  <path d="M 0 135 
           L 180 135 
           L 190 120 L 195 150 L 200 135
           L 320 135 
           L 330 110 L 335 160 L 340 135
           L 360 135
           L 368 70 L 376 210 L 384 120 L 388 150 L 394 135
           L 510 135
           L 520 115 L 525 155 L 530 135
           L 610 135
           L 620 125 L 625 145 L 630 135
           L 800 135" 
        class="pulse-glow" filter="url(#cyanGlow)" />

  <!-- Glowing pulse points on peaks -->
  <circle cx="368" cy="70" r="3" fill="#ffffff" filter="url(#textGlow)" />
  <circle cx="376" cy="210" r="3" fill="#ffffff" filter="url(#textGlow)" />

  <!-- Project Name -->
  <text x="400" y="105" text-anchor="middle" class="title-text" filter="url(#textGlow)">إطمن • ETMEN</text>

  <!-- Subtitle -->
  <text x="400" y="152" text-anchor="middle" class="subtitle-text">DEPI FULL STACK .NET TRACK</text>

  <!-- Info -->
  <text x="400" y="192" text-anchor="middle" class="info-text">Projects Repository — Team of 5 — Egypt — 2026</text>
</svg>
