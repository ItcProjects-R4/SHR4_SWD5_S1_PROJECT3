<svg width="900" height="230" viewBox="0 0 900 230" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgG" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f3460"/>
      <stop offset="50%" stop-color="#16213e"/>
      <stop offset="100%" stop-color="#0d1b2a"/>
    </linearGradient>
    <filter id="ecgGlow" x="-5%" y="-50%" width="110%" height="200%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="txtGlow" x="-10%" y="-30%" width="120%" height="160%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="7" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <clipPath id="clip"><rect width="900" height="230" rx="12"/></clipPath>
    <linearGradient id="goldGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#ffe259"/>
      <stop offset="100%" stop-color="#ffa751"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="900" height="230" fill="url(#bgG)" rx="12"/>

  <!-- Grid -->
  <g clip-path="url(#clip)" stroke="#00B4D8" stroke-width="0.4" opacity="0.07">
    <line x1="0" y1="46" x2="900" y2="46"/><line x1="0" y1="92" x2="900" y2="92"/>
    <line x1="0" y1="138" x2="900" y2="138"/><line x1="0" y1="184" x2="900" y2="184"/>
    <line x1="150" y1="0" x2="150" y2="230"/><line x1="300" y1="0" x2="300" y2="230"/>
    <line x1="450" y1="0" x2="450" y2="230"/><line x1="600" y1="0" x2="600" y2="230"/>
    <line x1="750" y1="0" x2="750" y2="230"/>
  </g>

  <!-- ECG Line (seamless loop: path repeats every 500px, animates +500px) -->
  <g clip-path="url(#clip)" filter="url(#ecgGlow)">
    <path d="M-500,138 L-330,138 L-315,120 L-300,138 L-268,138 L-256,162 L-246,40 L-236,186 L-226,138 L-196,138 L-166,108 L-148,138
             L0,138 L170,138 L185,120 L200,138 L232,138 L244,162 L254,40 L264,186 L274,138 L304,138 L334,108 L352,138
             L500,138 L670,138 L685,120 L700,138 L732,138 L744,162 L754,40 L764,186 L774,138 L804,138 L834,108 L852,138
             L1000,138 L1170,138 L1185,120 L1200,138 L1232,138 L1244,162 L1254,40 L1264,186 L1274,138 L1304,138 L1334,108 L1352,138 L1500,138"
      fill="none" stroke="#00B4D8" stroke-width="2.2" opacity="0.85">
      <animateTransform attributeName="transform" type="translate" from="0,0" to="500,0" dur="4s" repeatCount="indefinite"/>
    </path>
  </g>

  <!-- Radar ping LEFT -->
  <circle cx="72" cy="115" r="3" fill="#00B4D8">
    <animate attributeName="r" values="2;5;2" dur="3s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.2;1;0.2" dur="3s" repeatCount="indefinite"/>
  </circle>
  <circle cx="72" cy="115" r="10" fill="none" stroke="#00B4D8" stroke-width="1.2">
    <animate attributeName="r" values="6;22;6" dur="3s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.5;0;0.5" dur="3s" repeatCount="indefinite"/>
  </circle>

  <!-- Radar ping RIGHT -->
  <circle cx="828" cy="115" r="3" fill="#00B4D8">
    <animate attributeName="r" values="2;5;2" dur="3s" begin="1.5s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.2;1;0.2" dur="3s" begin="1.5s" repeatCount="indefinite"/>
  </circle>
  <circle cx="828" cy="115" r="10" fill="none" stroke="#00B4D8" stroke-width="1.2">
    <animate attributeName="r" values="6;22;6" dur="3s" begin="1.5s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.5;0;0.5" dur="3s" begin="1.5s" repeatCount="indefinite"/>
  </circle>

  <!-- 💡 Sponsor Badge (Top Left) -->
  <g transform="translate(35, 18)">
    <rect x="0" y="0" width="200" height="30" rx="6" fill="#16213e" fill-opacity="0.6" stroke="#00B4D8" stroke-width="1"/>
    <text x="15" y="19" font-family="Cairo, Arial, sans-serif" font-weight="700" font-size="11" fill="#e2e8f0">تحت رعاية مبادرة DEPI و ITC</text>
    <circle cx="185" cy="15" r="3.5" fill="#00B4D8">
      <animate attributeName="opacity" values="0.3;1;0.3" dur="1.5s" repeatCount="indefinite"/>
    </circle>
  </g>

  <!-- 🏆 1st Place Award Badge (Top Right) -->
  <g transform="translate(665, 18)">
    <rect x="0" y="0" width="200" height="30" rx="6" fill="#16213e" fill-opacity="0.6" stroke="url(#goldGrad)" stroke-width="1"/>
    <!-- Trophy Icon -->
    <path d="M 12 6 C 10.9 6 10 6.9 10 8 L 10 10 C 10 12.2 11.8 14 14 14 L 14 17 L 12 17 C 11.4 17 11 17.4 11 18 L 11 19 C 11 19.6 11.4 20 12 20 L 20 20 C 20.6 20 21 19.6 21 19 L 21 18 C 21 17.4 20.6 17 20 17 L 18 17 L 18 14 C 20.2 14 22 12.2 22 10 L 22 8 C 22 6.9 21.1 6 20 6 L 12 6 Z M 8 8 L 10 8 L 10 11 L 8 11 C 7.4 11 7 10.6 7 10 L 7 9 C 7 8.4 7.4 8 8 8 Z M 24 8 C 24.6 8 25 8.4 25 9 L 25 10 C 25 10.6 24.6 11 24 11 L 22 11 L 22 8 L 24 8 Z" fill="#ffe259" transform="translate(15, 0) scale(0.9)"/>
    <text x="48" y="19" font-family="Cairo, Arial, sans-serif" font-weight="900" font-size="11" fill="#ffe259" letter-spacing="0.5">المركز الأول 🥇 1st Place</text>
  </g>

  <!-- Glow layer for title -->
  <text x="450" y="103" font-family="Cairo, Arial Black, Impact, sans-serif" font-size="55" font-weight="900"
    text-anchor="middle" fill="#00B4D8" opacity="0.22" filter="url(#txtGlow)">إطمن ETMEN</text>

  <!-- Main title -->
  <text x="450" y="103" font-family="Cairo, Arial Black, Impact, sans-serif" font-size="55" font-weight="900"
    text-anchor="middle" fill="#FFFFFF">
    إطمن • ETMEN
    <animate attributeName="opacity" values="0.88;1;0.88" dur="4s" repeatCount="indefinite"/>
  </text>

  <!-- Animated underline -->
  <rect y="116" height="2.5" fill="#00B4D8" rx="1.5">
    <animate attributeName="x" values="390;310;390" dur="4s" repeatCount="indefinite"/>
    <animate attributeName="width" values="120;280;120" dur="4s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.4;1;0.4" dur="4s" repeatCount="indefinite"/>
  </rect>

  <!-- Subtitle -->
  <text x="450" y="154" font-family="Arial, Helvetica, sans-serif" font-size="15"
    text-anchor="middle" fill="#a8d8ea" letter-spacing="4">DEPI FULL STACK .NET TRACK</text>

  <!-- Caption 1 -->
  <text x="450" y="190" font-family="Cairo, Arial, sans-serif" font-size="12" font-weight="bold"
    text-anchor="middle" fill="#00B4D8" letter-spacing="1">
    تحت رعاية وزارة الاتصالات ومبادرة رواد مصر الرقمية (DEPI) بالتعاون مع ITC
  </text>

  <!-- Caption 2 -->
  <text x="450" y="210" font-family="Arial, Helvetica, sans-serif" font-size="10.5"
    text-anchor="middle" fill="#3d6b8a" letter-spacing="2">
    Graduation Project  —  Team of 5  —  Egypt  —  2026
  </text>

  <!-- Corner brackets -->
  <g stroke="#00B4D8" stroke-width="2.5" fill="none">
    <path d="M22,22 L22,50 M22,22 L50,22"><animate attributeName="opacity" values="0.3;0.8;0.3" dur="3s" repeatCount="indefinite"/></path>
    <path d="M878,22 L878,50 M878,22 L850,22"><animate attributeName="opacity" values="0.8;0.3;0.8" dur="3s" repeatCount="indefinite"/></path>
    <path d="M22,208 L22,180 M22,208 L50,208"><animate attributeName="opacity" values="0.5;0.9;0.5" dur="3s" repeatCount="indefinite"/></path>
    <path d="M878,208 L878,180 M878,208 L850,208"><animate attributeName="opacity" values="0.9;0.5;0.9" dur="3s" repeatCount="indefinite"/></path>
  </g>
</svg>
